apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-echo
  namespace: egress-demo
spec:
  podSelector:
    matchLabels:
      app: egress-client
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: echo-server
      ports:
        - protocol: TCP
          port: 5678
